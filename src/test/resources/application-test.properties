spring.datasource.url=jdbc:h2:mem:utilitybilling;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=never

jwt.secret=test-secret-key-test-secret-key-test-secret-key-1234567890
jwt.expiration=86400000
app.notifications.email.enabled=false
app.notifications.reminder.enabled=false
management.health.mail.enabled=false
