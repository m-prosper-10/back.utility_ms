spring.application.name=utility-billing-system

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/utility_billing}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.docker.compose.enabled=false
spring.docker.compose.lifecycle-management=none

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

springdoc.swagger-ui.path=/swagger-ui.html

jwt.secret=${JWT_SECRET:replace-this-with-a-very-long-secret-key-for-utility-billing-system}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.seed.admin.enabled=${APP_SEED_ADMIN_ENABLED:true}
app.seed.admin.full-name=${APP_SEED_ADMIN_FULL_NAME:System Administrator}
app.seed.admin.email=${APP_SEED_ADMIN_EMAIL:admin@utility.rw}
app.seed.admin.phone-number=${APP_SEED_ADMIN_PHONE:0788000000}
app.seed.admin.password=${APP_SEED_ADMIN_PASSWORD:password123}
